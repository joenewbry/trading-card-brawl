<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Card Brawl - Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app">
    <section id="class-select-screen" class="screen active">
      <div class="panel class-panel">
        <h1>Trading Card Brawl</h1>
        <p class="subtitle">Choose your class</p>
        <div id="class-list" class="class-list"></div>
      </div>
    </section>

    <section id="game-screen" class="screen">
      <header class="top-bar panel">
        <div class="hp-group">
          <div class="player-label">AI</div>
          <div class="hp-wrap">
            <div class="hp-fill" id="ai-hp-fill"></div>
          </div>
          <div class="hp-text" id="ai-hp-text">30 / 30</div>
        </div>

        <div class="center-status">
          <div id="turn-indicator" class="turn-indicator your-turn">YOUR TURN</div>
          <div class="mana" id="mana-counter">Mana: 3/3</div>
          <div id="class-vs" class="class-vs">Warrior vs Ranger</div>
        </div>

        <div class="hp-group">
          <div class="player-label">Player</div>
          <div class="hp-wrap">
            <div class="hp-fill" id="player-hp-fill"></div>
          </div>
          <div class="hp-text" id="player-hp-text">30 / 30</div>
        </div>
      </header>

      <main class="battlefield">
        <section class="board panel">
          <h2>AI Board</h2>
          <div id="ai-board" class="board-row"></div>
        </section>

        <section class="board panel">
          <h2>Your Board</h2>
          <div id="player-board" class="board-row"></div>
        </section>
      </main>

      <section class="controls panel">
        <button id="play-card-btn" class="action-btn" type="button">Play Card</button>
        <button id="attack-btn" class="action-btn" type="button">Attack</button>
        <button id="end-turn-btn" class="action-btn" type="button">End Turn</button>
      </section>

      <section class="hand panel">
        <h2>Your Hand</h2>
        <div id="player-hand" class="hand-row"></div>
      </section>
    </section>

    <section id="game-over-screen" class="screen">
      <div class="panel end-panel">
        <h2 id="game-over-title">Victory</h2>
        <p id="game-over-text">You defeated the AI.</p>
        <button id="play-again-btn" class="action-btn" type="button">Play Again</button>
      </div>
    </section>
  </div>

  <script src="game.js"></script>
</body>
</html>
